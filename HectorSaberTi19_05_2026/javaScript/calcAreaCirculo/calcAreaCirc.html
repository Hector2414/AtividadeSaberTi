<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Area do circulo</title>
</head>
<body>
    <h1>Cálculo da Área do Circulo</h1>

        <p><label for="area" > A área do circulo é: </label></p>
        <input type="text" id="area" readonly>
    </form>
</body>
<script src="calcAreaCirc.js"></script>
</html>

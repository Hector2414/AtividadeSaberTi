<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (min-width: 1025px) {
            .h-custom {
                height: 100vh !important;
            }
        }

        .card-registration .select-input.form-control[readonly]:not([disabled]) {
            font-size: 1rem;
            line-height: 2.15;
            padding-left: .75em;
            padding-right: .75em;
        }

        .card-registration .select-arrow {
            top: 13px;
        }

        .gradient-custom-2 {
            /* fallback for old browsers */
            background: #a1c4fd;

            /* Chrome 10-25, Safari 5.1-6 */
            background: -webkit-linear-gradient(to right, rgba(161, 196, 253, 1), rgba(194, 233, 251, 1));

            /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
            background: linear-gradient(to right, rgba(161, 196, 253, 1), rgba(194, 233, 251, 1))
        }

        .bg-indigo {
            background-color: #4835d4;
        }

        @media (min-width: 992px) {
            .card-registration-2 .bg-indigo {
                border-top-right-radius: 15px;
                border-bottom-right-radius: 15px;
            }
        }

        @media (max-width: 991px) {
            .card-registration-2 .bg-indigo {
                border-bottom-left-radius: 15px;
                border-bottom-right-radius: 15px;
            }
        }
    </style>
    <title>Cadastro:Cliente</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="homePage.html">Home</a>
            <button data-mdb-collapse-init class="navbar-toggler" type="button" data-mdb-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link active" aria-current="page" href="products.html">Produtos</a>
                    <a class="nav-link " href="categorias.html">Categorias</a>
                    <a class="nav-link " href="cadastros.html">Cadastro:Clientes</a>
                    <a class="nav-link " href="clientes.html">Clientes</a>
                    <a class="nav-link" href="login.html">Sair</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="h-custom gradient-custom-2">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12">
                    <div class="card card-registration shadow-lg" style="border-radius: 15px;">
                        <div class="card-body p-0">
                            <div class="row g-0">
                                <div class="col-lg-6">
                                    <div class="p-5">
                                        <h3 class="fw-normal mb-5 text-primary">
                                            General Information
                                        </h3>

                                        <div class="mb-4">

                                            <label class="form-label">
                                                Title
                                            </label>

                                            <select class="form-select">

                                                <option>Choose...</option>
                                                <option>Mr</option>
                                                <option>Mrs</option>
                                                <option>Other</option>

                                            </select>

                                        </div>

                                        <div class="row">

                                            <div class="col-md-6 mb-4">

                                                <label class="form-label">
                                                    First Name
                                                </label>

                                                <input type="text" class="form-control form-control-lg">

                                            </div>

                                            <div class="col-md-6 mb-4">

                                                <label class="form-label">
                                                    Last Name
                                                </label>

                                                <input type="text" class="form-control form-control-lg">

                                            </div>

                                        </div>

                                        <div class="mb-4">

                                            <label class="form-label">
                                                Description About Me
                                            </label>

                                            <input type="text" class="form-control form-control-lg">

                                        </div>

                                        <div class="row">

                                            <div class="col-md-6 mb-4">

                                                <label class="form-label">
                                                    Business Arena
                                                </label>

                                                <input type="text" class="form-control form-control-lg">

                                            </div>

                                            <div class="col-md-6 mb-4">

                                                <label class="form-label">
                                                    Employees
                                                </label>

                                                <select class="form-select">

                                                    <option>Choose...</option>
                                                    <option>1 - 10</option>
                                                    <option>10 - 50</option>
                                                    <option>50+</option>

                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-lg-6 bg-indigo text-white">
                                    <div class="p-5">
                                        <h3 class="fw-normal mb-5">
                                            Contact Details
                                        </h3>

                                        <div class="mb-4">

                                            <label class="form-label">
                                                Street + Number
                                            </label>

                                            <input type="text" class="form-control form-control-lg">

                                        </div>

                                        <div class="mb-4">

                                            <label class="form-label">
                                                Additional Information
                                            </label>

                                            <input type="text" class="form-control form-control-lg">

                                        </div>

                                        <div class="row">

                                            <div class="col-md-5 mb-4">

                                                <label class="form-label">
                                                    Zip Code
                                                </label>

                                                <input type="text" class="form-control form-control-lg">

                                            </div>

                                            <div class="col-md-7 mb-4">

                                                <label class="form-label">
                                                    Place
                                                </label>

                                                <input type="text" class="form-control form-control-lg">

                                            </div>

                                        </div>

                                        <div class="mb-4">

                                            <label class="form-label">
                                                Country
                                            </label>

                                            <input type="text" class="form-control form-control-lg">

                                        </div>

                                        <div class="row">

                                            <div class="col-md-5 mb-4">

                                                <label class="form-label">
                                                    Code +
                                                </label>

                                                <input type="text" class="form-control form-control-lg">

                                            </div>

                                            <div class="col-md-7 mb-4">

                                                <label class="form-label">
                                                    Phone Number
                                                </label>

                                                <input type="text" class="form-control form-control-lg">

                                            </div>

                                        </div>

                                        <div class="mb-4">

                                            <label class="form-label">
                                                Your Email
                                            </label>

                                            <input type="email" class="form-control form-control-lg">

                                        </div>

                                        <div class="form-check mb-4">

                                            <input class="form-check-input" type="checkbox" id="terms">

                                            <label class="form-check-label" for="terms">

                                                I accept the
                                                <a href="#" class="text-white">
                                                    Terms and Conditions
                                                </a>

                                            </label>

                                        </div>

                                        <button type="button" class="btn btn-light btn-lg">
                                            Register
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

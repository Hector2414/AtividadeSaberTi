<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cdtClientes.css">
    <title>Document</title>
</head>
<body>
    
    <h1 id="titulo">Cadastro de Cilentes</h1>

    <p>Preencha os campos abaixo</p>
    
    <form action="">

        <label for="" > Nome completo</label><br>
        <input type="text" placeholder="Digite seu nome "><br><br>

        <label for=""> CPF</label><br>
        <input type="text" placeholder="Digite seu CPF "><br><br>

        <label for=""> Email</label><br>
        <input type="email" placeholder="Digite seu email "><br><br>

        <label for=""> Telefone</label><br>
        <input type="text" placeholder="Digite seu Telefone "><br><br>

        <label for=""> Data de nascimento</label><br>
        <input type="date"><br><br>

        <label for=""> Endereço: </label><br>
        <input type="text" placeholder="Digite seu endereço "><br><br>

        <label for=""> Cidade: </label><br>
        <input type="text" placeholder="Digite sua cidade "><br><br>

        <label for=""> Estado: </label><br>
        <select id="pet-select">
            <option value="">escolha seu estado</option>
            <option value="SP">SP</option>
            <option value="RS">RS</option>
            <option value="PR">PR</option>
            <option value="RJ">RJ</option>
            <option value="BA">BA</option>
            <option value="MG">MG</option>
        </select><br><br>

        <label for=""> Tipo de cliente: </label><br>
        <select name="" id="">
            <option value="">escolha seu tipo</option>
            <option value="Pessoa Física">Pessoa Física</option>
            <option value="Pessoa Jurídica">Pessoa Jurídica</option>
        
        </select><br><br>

        <label for="" > Observações: </label><br>
        <textarea name="" id=""></textarea><br><br>
    
        <div>
            <button class="botao">Gravar </button>
            <button class="botao">Limpar</button>    
        </div>
        

    </form>


</body>
</html>
